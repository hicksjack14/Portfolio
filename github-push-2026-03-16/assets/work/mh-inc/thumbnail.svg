<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <!-- Background -->
  <rect width="1200" height="675" fill="#0D0D0F"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#C9A227" opacity="0.12"/>
  </pattern>
  <rect width="1200" height="675" fill="url(#dots)"/>

  <!-- Top rule -->
  <line x1="120" y1="120" x2="1080" y2="120" stroke="#C9A227" stroke-width="0.75" opacity="0.35"/>

  <!-- M&H -->
  <text x="600" y="345"
    font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif"
    font-weight="900"
    font-size="220"
    fill="#F0EDE8"
    text-anchor="middle"
    letter-spacing="16">M&amp;H</text>

  <!-- Divider -->
  <line x1="440" y1="390" x2="760" y2="390" stroke="#C9A227" stroke-width="1.5" opacity="0.8"/>

  <!-- Subtitle -->
  <text x="600" y="430"
    font-family="'IBM Plex Mono', 'Courier New', monospace"
    font-size="20"
    fill="#C9A227"
    text-anchor="middle"
    letter-spacing="8">TALENT REPRESENTATION</text>

  <!-- Detail line -->
  <text x="600" y="470"
    font-family="'IBM Plex Mono', 'Courier New', monospace"
    font-size="13"
    fill="#888880"
    text-anchor="middle"
    letter-spacing="5">A&amp;R · ARTIST SERVICES · SYR, NY</text>

  <!-- Bottom rule -->
  <line x1="120" y1="555" x2="1080" y2="555" stroke="#C9A227" stroke-width="0.75" opacity="0.35"/>

  <!-- Bottom label -->
  <text x="120" y="578"
    font-family="'IBM Plex Mono', 'Courier New', monospace"
    font-size="11"
    fill="#888880"
    letter-spacing="4">JACK HICKS</text>
  <text x="1080" y="578"
    font-family="'IBM Plex Mono', 'Courier New', monospace"
    font-size="11"
    fill="#888880"
    text-anchor="end"
    letter-spacing="4">2026</text>
</svg>
